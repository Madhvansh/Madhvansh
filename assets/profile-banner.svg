<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Madhvansh Choksi — reproducible machine-learning systems</title>
  <desc id="desc">A dark technical banner connecting search, evidence, and runnable software.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.58" stop-color="#0b1830"/>
      <stop offset="1" stop-color="#112348"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4fd1c5"/>
      <stop offset="1" stop-color="#8b9cff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <rect width="1200" height="280" rx="24" fill="url(#background)"/>
  <circle cx="1040" cy="-20" r="180" fill="#5669ff" opacity="0.1"/>
  <circle cx="1130" cy="250" r="155" fill="#39d0bf" opacity="0.08"/>
  <path d="M0 234 C240 190 390 286 640 230 S980 180 1200 224" fill="none" stroke="#8b9cff" stroke-opacity="0.1" stroke-width="2"/>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="66" y="88" fill="#f3f7ff" font-size="48" font-weight="700" letter-spacing="-1">Madhvansh Choksi</text>
    <text x="68" y="128" fill="#aebddd" font-size="21">Reproducible ML systems for search, forecasting,</text>
    <text x="68" y="157" fill="#aebddd" font-size="21">recommendation, and industrial decision support.</text>

    <rect x="68" y="192" width="460" height="42" rx="21" fill="#122743" stroke="#4fd1c5" stroke-opacity="0.45"/>
    <circle cx="92" cy="213" r="5" fill="#4fd1c5"/>
    <text x="108" y="220" fill="#d8e5ff" font-size="16" font-weight="600">Public evidence · Runnable software · Clear limits</text>
  </g>

  <g transform="translate(626 56)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <path d="M98 48 H176 M278 48 H356" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <path d="M169 42 L178 48 L169 54 M349 42 L358 48 L349 54" fill="none" stroke="#8b9cff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <g>
      <rect x="0" y="0" width="100" height="96" rx="18" fill="#10243d" stroke="#4fd1c5" stroke-opacity="0.5"/>
      <circle cx="42" cy="38" r="14" fill="none" stroke="#4fd1c5" stroke-width="4"/>
      <path d="M52 48 L65 61" stroke="#4fd1c5" stroke-width="4" stroke-linecap="round"/>
      <text x="50" y="82" text-anchor="middle" fill="#dce8ff" font-size="15" font-weight="600">SEARCH</text>
    </g>

    <g>
      <rect x="178" y="0" width="100" height="96" rx="18" fill="#10243d" stroke="#7186ff" stroke-opacity="0.55"/>
      <path d="M207 56 L223 40 L235 51 L250 32" fill="none" stroke="#8b9cff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="207" cy="56" r="4" fill="#8b9cff"/>
      <circle cx="223" cy="40" r="4" fill="#8b9cff"/>
      <circle cx="235" cy="51" r="4" fill="#8b9cff"/>
      <circle cx="250" cy="32" r="4" fill="#8b9cff"/>
      <text x="228" y="82" text-anchor="middle" fill="#dce8ff" font-size="15" font-weight="600">EVIDENCE</text>
    </g>

    <g>
      <rect x="358" y="0" width="100" height="96" rx="18" fill="#10243d" stroke="#4fd1c5" stroke-opacity="0.5"/>
      <path d="M385 52 L402 66 L432 32" fill="none" stroke="#4fd1c5" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="408" y="82" text-anchor="middle" fill="#dce8ff" font-size="15" font-weight="600">SHIP</text>
    </g>

    <rect x="28" y="128" width="404" height="42" rx="12" fill="#0d1d34" stroke="#7186ff" stroke-opacity="0.28"/>
    <text x="230" y="154" text-anchor="middle" fill="#aebddd" font-size="15">tests · CI · releases · provenance · feedback loops</text>
  </g>

  <rect x="50" y="250" width="1100" height="1" fill="url(#accent)" opacity="0.35"/>
</svg>
